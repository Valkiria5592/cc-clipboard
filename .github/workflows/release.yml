name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: target/release/cc-clipboard.exe
          body: |
            ## cc-clipboard ${{ github.ref_name }}

            Windows system tray app — press `Ctrl+Shift+S` to capture a screen region and auto-copy the file path to clipboard.

            ### Install
            1. Download `cc-clipboard.exe`
            2. Run it — a tray icon appears (bottom-right)
            3. Press `Ctrl+Shift+S` from any window to capture

            ### Notes
            - No installer, no runtime required
            - Saves to `%USERPROFILE%\Pictures\cc-clipboard\`
            - Config at `%APPDATA%\cc-clipboard\config.json`
            - Windows SmartScreen may warn on first run — click "More info → Run anyway"
